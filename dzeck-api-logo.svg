<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 200" width="320" height="200" fill="none">
  <defs>
    <linearGradient id="gMain" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c0604a"/>
    </linearGradient>
    <linearGradient id="gAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8956d"/>
      <stop offset="100%" stop-color="#d97757"/>
    </linearGradient>
    <linearGradient id="gText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8956d"/>
      <stop offset="60%" stop-color="#d97757"/>
      <stop offset="100%" stop-color="#c0604a"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="nodeGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Cloud shape -->
  <path
    d="M72 128
       a28 28 0 0 1 0-56
       a18 18 0 0 1 34-8
       a24 24 0 1 1 8 48
       Z"
    stroke="url(#gMain)" stroke-width="4.5" stroke-linejoin="round" stroke-linecap="round"
    filter="url(#glow)"
  />

  <!-- Radar outer ring dashed -->
  <circle cx="138" cy="82" r="38"
    stroke="#d97757" stroke-width="3"
    stroke-dasharray="8 5"
    opacity="0.5"
  />
  <!-- Radar middle ring -->
  <circle cx="138" cy="82" r="24"
    stroke="url(#gMain)" stroke-width="3"
    opacity="0.9"
    filter="url(#glow)"
  />
  <!-- Hub fill -->
  <circle cx="138" cy="82" r="7"
    fill="url(#gMain)"
    filter="url(#nodeGlow)"
  />
  <!-- Center dot -->
  <circle cx="138" cy="82" r="3" fill="#f5f5f5" opacity="0.9"/>

  <!-- Sweep line vertical -->
  <line x1="138" y1="82" x2="138" y2="46"
    stroke="url(#gAccent)" stroke-width="3" stroke-linecap="round"
    filter="url(#glow)"
  />
  <!-- Sweep line diagonal -->
  <line x1="138" y1="82" x2="111" y2="57"
    stroke="#d97757" stroke-width="2" stroke-linecap="round" opacity="0.45"
  />

  <!-- Top-left node -->
  <line x1="118" y1="58" x2="82" y2="36"
    stroke="url(#gAccent)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="82" cy="36" r="8" stroke="url(#gAccent)" stroke-width="3" filter="url(#nodeGlow)"/>
  <circle cx="82" cy="36" r="3" fill="#d97757"/>

  <!-- Top-right node -->
  <line x1="158" y1="58" x2="196" y2="36"
    stroke="url(#gMain)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="196" cy="36" r="8" stroke="url(#gMain)" stroke-width="3" filter="url(#nodeGlow)"/>
  <circle cx="196" cy="36" r="3" fill="#d97757"/>

  <!-- Right mid node -->
  <line x1="176" y1="82" x2="210" y2="74"
    stroke="url(#gAccent)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="210" cy="74" r="8" stroke="url(#gAccent)" stroke-width="3" filter="url(#nodeGlow)"/>
  <circle cx="210" cy="74" r="3" fill="#e8956d"/>

  <!-- Right connector -->
  <line x1="196" y1="36" x2="210" y2="74"
    stroke="#d97757" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Left mid node -->
  <line x1="100" y1="82" x2="66" y2="74"
    stroke="url(#gMain)" stroke-width="2.5" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="66" cy="74" r="8" stroke="url(#gMain)" stroke-width="3" filter="url(#nodeGlow)"/>
  <circle cx="66" cy="74" r="3" fill="#d97757"/>

  <!-- Left connector -->
  <line x1="82" y1="36" x2="66" y2="74"
    stroke="#d97757" stroke-width="1.5" stroke-linecap="round" opacity="0.35"/>

  <!-- Separator -->
  <line x1="85" y1="148" x2="191" y2="148"
    stroke="#d97757" stroke-width="1" opacity="0.35"/>

  <!-- DZECK text -->
  <text
    x="138" y="170"
    text-anchor="middle"
    font-family="'Segoe UI','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="28"
    font-weight="800"
    letter-spacing="5"
    fill="url(#gText)"
    filter="url(#glow)"
  >DZECK</text>

  <!-- API GATEWAY sub-label -->
  <text
    x="138" y="189"
    text-anchor="middle"
    font-family="'Segoe UI','Inter','Helvetica Neue',Arial,sans-serif"
    font-size="11"
    font-weight="400"
    letter-spacing="8"
    fill="#d97757"
    opacity="0.7"
  >A P I  G A T E W A Y</text>

</svg>
